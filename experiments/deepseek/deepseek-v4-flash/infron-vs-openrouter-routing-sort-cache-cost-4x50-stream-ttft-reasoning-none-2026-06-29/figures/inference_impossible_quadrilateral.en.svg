<text x="48" y="960" class="tick">How to read: THR/PRI/LAT/TTFT represent the four routing modes; the blue region is Infron, the orange region is OpenRouter, and outward direction indicates metric advantage.</text>
<text x="48" y="984" class="tick">The chart uses unified normalization, four-dimensional to two-dimensional projection, and consistent radial visual scaling for region overview; exact metric-level wins and losses are reported in the tables.</text>
