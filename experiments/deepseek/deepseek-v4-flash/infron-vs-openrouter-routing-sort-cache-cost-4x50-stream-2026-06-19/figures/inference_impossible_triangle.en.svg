<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.title{font-size:22px;font-weight:700}.label{font-size:13px;fill:#374151}.tick{font-size:12px;fill:#6b7280}.value{font-size:12px;fill:#111827}</style><rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="36" class="title">Inference Platform Impossible Triangle: Throughput, Price, Latency</text>
<text x="48" y="62" class="label">No platform optimizes throughput, price, and latency at once; production routing must choose priorities.</text>
<polygon points="540,102 210,470 870,470" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<line x1="540" y1="102" x2="540" y2="352" stroke="#cbd5e1" stroke-dasharray="5 5"/>
<line x1="210" y1="470" x2="540" y2="352" stroke="#cbd5e1" stroke-dasharray="5 5"/>
<line x1="870" y1="470" x2="540" y2="352" stroke="#cbd5e1" stroke-dasharray="5 5"/>
<text x="540" y="82" class="label" font-weight="900" text-anchor="middle">Throughput</text>
<text x="540" y="100" class="tick" text-anchor="middle">Higher response tok/s</text>
<text x="182" y="498" class="label" font-weight="900" text-anchor="middle">Price</text>
<text x="205" y="518" class="tick" text-anchor="middle">Lower observed cost</text>
<text x="898" y="498" class="label" font-weight="900" text-anchor="middle">Latency</text>
<text x="875" y="518" class="tick" text-anchor="middle">Lower full response time</text>
<text x="540" y="360" class="tick" text-anchor="middle">Business goals determine the target corner</text>
<circle cx="493.5" cy="347.0" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
<text x="477.5" y="333.0" class="label" font-weight="900" text-anchor="end" fill="#2563eb">Infron</text>
<text x="477.5" y="353.0" class="tick" text-anchor="end">Closer to price</text>
<circle cx="570.5" cy="336.0" r="10" fill="#f97316" stroke="#ffffff" stroke-width="3"/>
<text x="586.5" y="322.0" class="label" font-weight="900" text-anchor="start" fill="#f97316">OpenRouter</text>
<text x="586.5" y="342.0" class="tick" text-anchor="start">Closer to throughput</text>
<rect x="48" y="130" width="245" height="150" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
<text x="64" y="156" class="label" font-weight="900">Relative position</text>
<circle cx="66" cy="180" r="5" fill="#2563eb"/>
<text x="80" y="184" class="tick">Infron: Throughput 0.33 / Price 0.40 / Latency 0.26</text>
<circle cx="66" cy="210" r="5" fill="#f97316"/>
<text x="80" y="214" class="tick">OpenRouter: Throughput 0.36 / Price 0.27 / Latency 0.36</text>
<text x="64" y="266" class="tick">Values are triangle-coordinate weights; the three dimensions sum to 1.</text>
</svg>