<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.title{font-size:22px;font-weight:700}.label{font-size:13px;fill:#374151}.tick{font-size:12px;fill:#6b7280}.value{font-size:12px;fill:#111827}</style><rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="36" class="title">Inference 平台“不可能三角”：吞吐量、价格与时延</text>
<text x="48" y="62" class="label">没有平台能在吞吐量、价格和时延三个方向同时达到最优；工程上通常需要选择策略侧重。</text>
<polygon points="540,102 210,470 870,470" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<line x1="540" y1="102" x2="540" y2="352" stroke="#cbd5e1" stroke-dasharray="5 5"/>
<line x1="210" y1="470" x2="540" y2="352" stroke="#cbd5e1" stroke-dasharray="5 5"/>
<line x1="870" y1="470" x2="540" y2="352" stroke="#cbd5e1" stroke-dasharray="5 5"/>
<text x="540" y="82" class="label" font-weight="900" text-anchor="middle">吞吐量</text>
<text x="540" y="100" class="tick" text-anchor="middle">更高 response tok/s</text>
<text x="182" y="498" class="label" font-weight="900" text-anchor="middle">价格</text>
<text x="205" y="518" class="tick" text-anchor="middle">更低实际成本</text>
<text x="898" y="498" class="label" font-weight="900" text-anchor="middle">时延</text>
<text x="875" y="518" class="tick" text-anchor="middle">更低完整响应耗时</text>
<text x="540" y="360" class="tick" text-anchor="middle">业务目标决定靠近哪个角</text>
<circle cx="493.5" cy="347.0" r="10" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
<text x="477.5" y="333.0" class="label" font-weight="900" text-anchor="end" fill="#2563eb">Infron</text>
<text x="477.5" y="353.0" class="tick" text-anchor="end">更靠近价格</text>
<circle cx="570.5" cy="336.0" r="10" fill="#f97316" stroke="#ffffff" stroke-width="3"/>
<text x="586.5" y="322.0" class="label" font-weight="900" text-anchor="start" fill="#f97316">OpenRouter</text>
<text x="586.5" y="342.0" class="tick" text-anchor="start">更靠近吞吐量</text>
<rect x="48" y="130" width="245" height="150" rx="8" fill="#ffffff" stroke="#dbe3ef"/>
<text x="64" y="156" class="label" font-weight="900">相对位置解释</text>
<circle cx="66" cy="180" r="5" fill="#2563eb"/>
<text x="80" y="184" class="tick">Infron: 吞吐 0.33 / 价格 0.40 / 时延 0.26</text>
<circle cx="66" cy="210" r="5" fill="#f97316"/>
<text x="80" y="214" class="tick">OpenRouter: 吞吐 0.36 / 价格 0.27 / 时延 0.36</text>
<text x="64" y="266" class="tick">数值为三角坐标权重，三项合计为 1。</text>
</svg>