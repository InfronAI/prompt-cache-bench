<text x="72" y="438" class="label">Observed signal: Infron token-level cache hit rate is about 83%-94%; observed cost is lower in Price First and Latency First.</text>
<text x="72" y="466" class="label">Interpretation: high cache read tokens reduce repeated prefill cost; provider stick stabilizes cache domains; cost-aware routing selects better price paths among healthy providers.</text>
