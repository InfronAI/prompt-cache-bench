<text x="975.0" y="150" class="label" font-weight="800" text-anchor="middle">Actual Cost</text>
<text x="975.0" y="176" class="tick" text-anchor="middle">usage.cost + details</text>
<rect x="326" y="286" width="210" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="431.0" y="320" class="label" font-weight="800" text-anchor="middle">Provider Stick</text>
<text x="431.0" y="346" class="tick" text-anchor="middle">avoid cache fragmentation</text>
<rect x="608" y="286" width="210" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="713.0" y="320" class="label" font-weight="800" text-anchor="middle">Cost-aware Routing</text>
<text x="713.0" y="346" class="tick" text-anchor="middle">healthy low-cost path</text>
