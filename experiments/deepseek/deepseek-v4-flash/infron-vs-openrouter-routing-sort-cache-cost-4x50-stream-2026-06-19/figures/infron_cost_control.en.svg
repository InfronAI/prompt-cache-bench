<text x="159.0" y="150" class="label" font-weight="800" text-anchor="middle">Stable Prefix</text>
<text x="159.0" y="176" class="tick" text-anchor="middle">system / tools / RAG</text>
<rect x="326" y="116" width="210" height="88" rx="8" fill="#fefce8" stroke="#facc15" stroke-width="1.5"/>
<text x="431.0" y="150" class="label" font-weight="800" text-anchor="middle">Cache Read</text>
<text x="431.0" y="176" class="tick" text-anchor="middle">skip repeated prefill</text>
