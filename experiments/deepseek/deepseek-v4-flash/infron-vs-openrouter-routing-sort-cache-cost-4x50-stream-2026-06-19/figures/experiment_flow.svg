<text x="282" y="285" class="label">每轮请求两次相同 提示词：第一次触发/建立缓存，第二次观测 缓存读取 tokens。</text>
<text x="282" y="312" class="label">同一 路由排序下 请求载荷 SHA256 固定，用响应 usage.prompt_tokens 做真实 token 口径。</text>
