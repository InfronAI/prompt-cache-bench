<text x="377.0" y="126" class="tick" text-anchor="middle">第一次 + 第二次请求</text>
<rect x="282" y="170" width="190" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="377.0" y="200" class="label" font-weight="700" text-anchor="middle">OpenRouter</text>
<text x="377.0" y="224" class="tick" text-anchor="middle">第一次 + 第二次请求</text>
<rect x="548" y="118" width="190" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="643.0" y="148" class="label" font-weight="700" text-anchor="middle">按 sort/group/round 配对</text>
<text x="643.0" y="172" class="tick" text-anchor="middle">A/B pair</text>
<rect x="812" y="118" width="210" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="917.0" y="148" class="label" font-weight="700" text-anchor="middle">过滤后聚合</text>
<text x="917.0" y="172" class="tick" text-anchor="middle">缓存 / 成本 / 端到端E2E时延 / 流式TTFT</text>
