<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.title{font-size:22px;font-weight:700}.label{font-size:13px;fill:#374151}.tick{font-size:12px;fill:#6b7280}.value{font-size:12px;fill:#111827}</style><rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="34" class="title">实验数据生成流程</text>
<text x="48" y="58" class="label">同一 请求载荷、同一 路由排序、同一 group/round 下分别请求 Infron 与 OpenRouter。</text>
