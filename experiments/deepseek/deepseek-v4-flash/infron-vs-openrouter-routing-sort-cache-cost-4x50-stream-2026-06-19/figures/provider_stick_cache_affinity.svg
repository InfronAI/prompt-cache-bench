<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.title{font-size:22px;font-weight:700}.label{font-size:13px;fill:#374151}.tick{font-size:12px;fill:#6b7280}.value{font-size:12px;fill:#111827}</style><rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="36" class="title">Provider Stick / Cache Affinity 机制</text>
<text x="48" y="62" class="label">相同 stable prefix 的连续请求优先落入同一健康缓存域，减少跨 provider 暖缓存。</text>
<rect x="70" y="110" width="190" height="68" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
<text x="165" y="138" class="label" font-weight="800" text-anchor="middle">Round N first</text>
<text x="165" y="160" class="tick" text-anchor="middle">stable prefix P</text>
<rect x="70" y="210" width="190" height="68" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
<text x="165" y="238" class="label" font-weight="800" text-anchor="middle">Round N second</text>
<text x="165" y="260" class="tick" text-anchor="middle">stable prefix P</text>
<rect x="70" y="310" width="190" height="68" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
<text x="165" y="338" class="label" font-weight="800" text-anchor="middle">Round N+1</text>
<text x="165" y="360" class="tick" text-anchor="middle">stable prefix P</text>
<rect x="360" y="150" width="230" height="138" rx="10" fill="#fefce8" stroke="#facc15" stroke-width="1.6"/>
<text x="475" y="184" class="label" font-weight="800" text-anchor="middle">Stick Key</text>
<text x="475" y="214" class="tick" text-anchor="middle">model + normalized prefix hash</text>
<text x="475" y="240" class="tick" text-anchor="middle">routing sort + tenant policy</text>
<text x="475" y="266" class="tick" text-anchor="middle">healthy provider set</text>
<rect x="720" y="100" width="260" height="78" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.6"/>
<text x="850" y="132" class="label" font-weight="800" text-anchor="middle">Preferred Provider</text>
<text x="850" y="156" class="tick" text-anchor="middle">warm cache domain</text>
<rect x="720" y="238" width="260" height="78" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="850" y="270" class="label" font-weight="800" text-anchor="middle">Fallback Providers</text>
<text x="850" y="294" class="tick" text-anchor="middle">used for health / quota / SLA</text>
<path d="M260,144 L360,219" stroke="#64748b" stroke-width="2" fill="none"/><path d="M352,214 L360,219 L352,224" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M260,244 L360,219" stroke="#64748b" stroke-width="2" fill="none"/><path d="M352,214 L360,219 L352,224" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M260,344 L360,219" stroke="#64748b" stroke-width="2" fill="none"/><path d="M352,214 L360,219 L352,224" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M590,205 L720,139" stroke="#64748b" stroke-width="2" fill="none"/><path d="M712,134 L720,139 L712,144" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M590,250 L720,277" stroke="#64748b" stroke-width="2" fill="none"/><path d="M712,272 L720,277 L712,282" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M850,178 C850,198 850,215 850,238" stroke="#16a34a" stroke-width="3" fill="none" stroke-dasharray="5 5"/>
<text x="694" y="390" class="label">Provider stick 不等于禁用 fallback；它是在健康 provider 集合内优先保持缓存亲和。</text>
<text x="70" y="442" class="label">结果信号：同一 sort 内 provider 分布越集中，第二次请求越容易读取同一缓存域中的 prefix cache。</text>
</svg>