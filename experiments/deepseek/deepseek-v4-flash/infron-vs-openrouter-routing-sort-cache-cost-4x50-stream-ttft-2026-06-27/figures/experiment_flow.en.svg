<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.title{font-size:22px;font-weight:700}.label{font-size:13px;fill:#374151}.tick{font-size:12px;fill:#6b7280}.value{font-size:12px;fill:#111827}</style><rect width="100%" height="100%" fill="#ffffff"/>
<text x="48" y="34" class="title">Experimental Data Generation Flow</text>
<text x="48" y="58" class="label">The same payload and routing sort are sent to Infron and OpenRouter under the same group/round.</text>
<rect x="48" y="118" width="170" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="133.0" y="148" class="label" font-weight="700" text-anchor="middle">Fixed payload</text>
<text x="133.0" y="172" class="tick" text-anchor="middle">model / prompt / usage</text>
<rect x="282" y="72" width="190" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="377.0" y="102" class="label" font-weight="700" text-anchor="middle">Infron</text>
<text x="377.0" y="126" class="tick" text-anchor="middle">first + second request</text>
<rect x="282" y="170" width="190" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="377.0" y="200" class="label" font-weight="700" text-anchor="middle">OpenRouter</text>
<text x="377.0" y="224" class="tick" text-anchor="middle">first + second request</text>
<rect x="548" y="118" width="190" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="643.0" y="148" class="label" font-weight="700" text-anchor="middle">Pair by sort/group/round</text>
<text x="643.0" y="172" class="tick" text-anchor="middle">A/B pair</text>
<rect x="812" y="118" width="210" height="76" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="917.0" y="148" class="label" font-weight="700" text-anchor="middle">Aggregate after filtering</text>
<text x="917.0" y="172" class="tick" text-anchor="middle">cache / cost / latency / TTFT</text>
<path d="M218,156 L282,110" stroke="#64748b" stroke-width="2" fill="none"/><path d="M274,105 L282,110 L274,115" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M218,156 L282,208" stroke="#64748b" stroke-width="2" fill="none"/><path d="M274,203 L282,208 L274,213" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M472,110 L548,156" stroke="#64748b" stroke-width="2" fill="none"/><path d="M540,151 L548,156 L540,161" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M472,208 L548,156" stroke="#64748b" stroke-width="2" fill="none"/><path d="M540,151 L548,156 L540,161" stroke="#64748b" stroke-width="2" fill="none"/>
<path d="M738,156 L812,156" stroke="#64748b" stroke-width="2" fill="none"/><path d="M804,151 L812,156 L804,161" stroke="#64748b" stroke-width="2" fill="none"/>
<text x="282" y="285" class="label">Each round sends the same prompt twice: the first triggers or establishes cache; the second observes cache-read tokens.</text>
<text x="282" y="312" class="label">Payload SHA-256 is fixed within each routing sort; response usage.prompt_tokens is the token source of truth.</text>
</svg>